<div class="account-page">
  <div class="account-page__inner">
    <h1 class="account-page__title">Account</h1>

    <app-account-info (onAccount)="loadAccount($event)"></app-account-info>

    <div class="account-page__section" *ngIf="friends.length > 0">
      <h2 class="account-page__section-title">Messenger</h2>
      <div class="account-chats">
        <div class="cr-card cr-card--pad" *ngFor="let chat of chats">
          <div class="account-chat__body">
            <p class="account-chat__meta">{{ chat.message.sender.nickName }}</p>
            <p class="account-chat__preview">{{ chat.message.content.content }}</p>
          </div>
          <button type="button" class="cr-btn cr-btn--primary" (click)="openChat(chat)">
            Open chat
          </button>
        </div>
      </div>
    </div>

    <div class="account-page__section account-page__section--friends">
      <app-account-friends
        [account]="account"
        (onFriends)="friends = $event"
      ></app-account-friends>
    </div>
  </div>
</div>
