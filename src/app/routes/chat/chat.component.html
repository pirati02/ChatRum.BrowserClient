<div class="tab-list-footer-page">
  <div class="header d-flex flex-row">
    <span style="flex-grow: 1">Chat</span>
    <mat-icon style="align-self: flex-end; cursor: pointer" (click)="openChatDetails()">menu</mat-icon>
  </div>
  <form [formGroup]="chatGroup$!">
    <div class="artists-list d-flex full-width full-height flex-column">
      <div class="d-flex flex-column full-width full-height">
        <div class="chat-container d-flex flex-column list-scroll-behavior" #scrollElement>
          <div class="message-box" id="messageBox">
            <ng-container *ngFor="let message of chat.messages" class="message-item">
              <ng-container
                [ngTemplateOutlet]="receiverTemplate"
                [ngTemplateOutletContext]="{
                  participant: this.getReceiver(message.sender.id),
                  message: message
                }"
                *ngIf="message.sender.id !== this.me?.id"></ng-container>
              <ng-container
                [ngTemplateOutlet]="senderTemplate"
                [ngTemplateOutletContext]="{
                  message: message
                }"
                *ngIf="message.sender.id === this.me?.id"></ng-container>
            </ng-container>
          </div>
        </div>
        <div>
          <div class="d-flex flex-row">
            <input type="text" class="message-input" id="message-content" formControlName="messageContent"
                   [placeholder]="messagePlaceholder" style="flex-grow: 1">
            <div>
              <button class="send-btn" (click)="fileInput.click()">
                <mat-icon>attach_file</mat-icon>
              </button>
              <input #fileInput type="file" accept="image/*" style="display: none" (change)="onFileSelected($event)">
            </div>
          </div>
          <button class="send-btn" (click)="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </form>
</div>

<ng-template #senderTemplate let-message="message">
  <div class="d-flex flex-column message-box-mine" style="margin: 1.5rem">
    <span style="font-size: 0.6em; margin-bottom: 1rem">you</span>
    <ng-container [ngSwitch]="message.content.$type || message.content.type">
      <ng-container *ngSwitchCase="'plain'" [ngTemplateOutlet]="plainTextContent"
                    [ngTemplateOutletContext]="{message: message}">
      </ng-container>
      <ng-container *ngSwitchCase="'link'" [ngTemplateOutlet]="linkContent"
                    [ngTemplateOutletContext]="{message: message}"></ng-container>
      <ng-container *ngSwitchCase="'image'" [ngTemplateOutlet]="imageContent"
                    [ngTemplateOutletContext]="{message: message, alignStyle: 'end'}"></ng-container>
    </ng-container>
    <span style="font-size: 0.8em">{{ message.statusString }}</span>
  </div>
</ng-template>


<ng-template #receiverTemplate let-participant="participant" let-message="message">
  <div class="d-flex flex-column message-box-others" style="margin: 1.5rem">
    <span style="font-size: 0.6em; margin-bottom: 1rem">{{ participant?.nickName }}</span>
    <ng-container [ngSwitch]="message.content.$type || message.content.type">
      <ng-container *ngSwitchCase="'plain'" [ngTemplateOutlet]="plainTextContent"
                    [ngTemplateOutletContext]="{message: message}">
      </ng-container>
      <ng-container *ngSwitchCase="'link'" [ngTemplateOutlet]="linkContent"
                    [ngTemplateOutletContext]="{message: message}"></ng-container>
      <ng-container *ngSwitchCase="'image'" [ngTemplateOutlet]="imageContent"
                    [ngTemplateOutletContext]="{message: message}"></ng-container>
    </ng-container>
  </div>
</ng-template>

<ng-template #plainTextContent let-message="message">
  <span style="font-size: 1.2em">{{ message.content.content }}</span>
</ng-template>

<ng-template #linkContent let-message="message">
  <a style="font-size: 1.2em" [href]="message.content.content" target="_blank">{{ message.content.content }}</a>
</ng-template>

<ng-template #imageContent let-message="message" let-alignStyle="alignStyle">
  <img [src]="'data:image/png;base64,' + message.content.content" style="max-width: 20rem; max-height: 20rem;"
       [ngStyle]="{
          'align-self':alignStyle || 'start'
          }">
</ng-template>
