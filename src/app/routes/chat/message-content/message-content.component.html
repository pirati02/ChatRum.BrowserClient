<ng-container [ngSwitch]="displayKind">
  <ng-container *ngSwitchCase="'plain'">
    <span style="font-size: 1.2em">{{ content.content }}</span>
  </ng-container>
  <ng-container *ngSwitchCase="'link'">
    <a style="font-size: 1.2em" [href]="content.content" target="_blank">{{
      content.content
    }}</a>
  </ng-container>
  <ng-container *ngSwitchCase="'image'">
    <img
      [src]="'data:image/png;base64,' + content.content"
      style="max-width: 20rem; max-height: 20rem"
      [ngStyle]="{ 'align-self': alignStyle }"
    />
  </ng-container>
  <ng-container *ngSwitchDefault>
    <span class="message-content__fallback" style="font-size: 1.2em"
      >Unable to display this message.</span
    >
  </ng-container>
</ng-container>
