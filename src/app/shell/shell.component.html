<div class="shell">
  <header class="shell-header">
    <div class="shell-header__left">
      <button
        type="button"
        class="shell-icon-btn shell-header__menu-btn"
        (click)="toggleMobileMenu()"
        aria-label="Toggle menu"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <a routerLink="/" class="shell-brand" (click)="closeMobileMenu()">ChatRum</a>
    </div>

    <nav class="shell-nav shell-nav--desktop" aria-label="Main">
      <a
        routerLink="/"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="shell-nav__link"
      >
        <mat-icon>home</mat-icon>
        <span>Accounts</span>
      </a>
      <a
        href="/feed"
        class="shell-nav__link"
        [class.is-active]="feedActive()"
        (click)="goFeed($event)"
      >
        <mat-icon>forum</mat-icon>
        <span>Feed</span>
      </a>
      <a
        routerLink="/chat"
        routerLinkActive="is-active"
        class="shell-nav__link"
      >
        <mat-icon>chat</mat-icon>
        <span>Chat</span>
      </a>
      <a
        href="/friends"
        class="shell-nav__link"
        [class.is-active]="friendsActive()"
        (click)="goFriends($event)"
      >
        <mat-icon>group</mat-icon>
        <span>Friends</span>
      </a>
    </nav>

    <div class="shell-header__right">
      <button
        type="button"
        mat-stroked-button
        class="shell-header__logout"
        (click)="logout()"
      >
        Log out
      </button>
      <div class="shell-header__avatar" aria-hidden="true">
        <mat-icon>person</mat-icon>
      </div>
    </div>
  </header>

  @if (mobileMenuOpen) {
    <div class="shell-mobile-menu">
      <nav class="shell-mobile-menu__nav" aria-label="Mobile main">
        <a
          routerLink="/"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="shell-mobile-menu__link"
          (click)="closeMobileMenu()"
        >
          <mat-icon>home</mat-icon>
          <span>Accounts</span>
        </a>
        <a
          href="/feed"
          class="shell-mobile-menu__link"
          [class.is-active]="feedActive()"
          (click)="goFeed($event)"
        >
          <mat-icon>forum</mat-icon>
          <span>Feed</span>
        </a>
        <a
          routerLink="/chat"
          routerLinkActive="is-active"
          class="shell-mobile-menu__link"
          (click)="closeMobileMenu()"
        >
          <mat-icon>chat</mat-icon>
          <span>Chat</span>
        </a>
        <a
          href="/friends"
          class="shell-mobile-menu__link"
          [class.is-active]="friendsActive()"
          (click)="goFriends($event)"
        >
          <mat-icon>group</mat-icon>
          <span>Friends</span>
        </a>
      </nav>
    </div>
  }

  <main class="shell-main">
    <router-outlet />
  </main>

  <nav class="shell-bottom-nav" aria-label="Bottom">
    <a
      routerLink="/"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="shell-bottom-nav__item"
    >
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </a>
    <a
      href="/feed"
      class="shell-bottom-nav__item"
      [class.is-active]="feedActive()"
      (click)="goFeed($event)"
    >
      <mat-icon>forum</mat-icon>
      <span>Feed</span>
    </a>
    <a routerLink="/chat" routerLinkActive="is-active" class="shell-bottom-nav__item">
      <mat-icon>chat</mat-icon>
      <span>Chat</span>
    </a>
    <a
      href="/friends"
      class="shell-bottom-nav__item"
      [class.is-active]="friendsActive()"
      (click)="goFriends($event)"
    >
      <mat-icon>group</mat-icon>
      <span>Friends</span>
    </a>
  </nav>
</div>
